services:
  backend:
    build: .
    env_file: .env
    restart: unless-stopped

  nginx:
    # Static files and nginx.conf are baked into the image (docker/Dockerfile.nginx).
    # After editing frontend/ or docker/nginx.conf: docker compose -f docker-compose.uat.yml build nginx && docker compose -f docker-compose.uat.yml up -d nginx
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
