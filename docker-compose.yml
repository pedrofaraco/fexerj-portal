services:
  backend:
    build: .
    env_file: .env
    restart: unless-stopped

  nginx:
    # Static files and nginx.conf are baked into the image (docker/Dockerfile.nginx).
    # After editing frontend/ or docker/nginx.conf: docker compose build nginx && docker compose up -d nginx
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-}
        BUILD_FRONTEND_SNAPSHOT: ${BUILD_FRONTEND_SNAPSHOT:-}
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
