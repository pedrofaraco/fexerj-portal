# Included under `http { }` via conf.d — `limit_req_zone` must stay at this scope.
#
# DSM (or another reverse proxy) often terminates TLS and forwards to this container.
# Then `$binary_remote_addr` is the immediate proxy, not the browser — rate limits can
# behave like a shared cap for all users. For a small internal team that is acceptable;
# these values still blunt runaway scripts and accidental tight loops.

limit_req_zone $binary_remote_addr zone=api_validate:1m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_run:1m rate=2r/m;

server {
    listen 80;

    # Align with backend PORTAL_MAX_UPLOAD_MEGABYTES to avoid nginx returning a generic 413
    # before the backend can provide a user-friendly message.
    client_max_body_size 100m;

    # Basic security headers (TLS is terminated upstream on Synology).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    # Vite: hashed filenames under /assets/ are safe to cache forever; index.html must
    # stay fresh so clients load the new chunk names after each deploy. Use only
    # `expires` here (not add_header) so server-level security headers still apply
    # to these locations (nginx add_header inheritance).
    location /assets/ {
        expires 1y;
    }

    location = /index.html {
        expires epoch;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /me {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /validate {
        limit_req zone=api_validate burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /run {
        limit_req zone=api_run burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
