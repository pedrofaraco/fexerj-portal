server {
    listen 80;

    # Align with backend PORTAL_MAX_UPLOAD_MEGABYTES to avoid nginx returning a generic 413
    # before the backend can provide a user-friendly message.
    client_max_body_size 100m;

    # Basic security headers (TLS is terminated upstream on Synology).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(health|me|validate|run)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /run can take time; keep proxy timeouts generous.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
