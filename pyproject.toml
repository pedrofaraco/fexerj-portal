[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["calculator/"]  # calculator module is not maintained here

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "B008",  # FastAPI explicitly uses Depends/File/Form as default values — false positive
]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
# calculator/ module has no type hints and is not maintained here
exclude = ["calculator/"]

[[tool.mypy.overrides]]
module = "calculator.*"
ignore_errors = true

[tool.pytest.ini_options]
addopts = "--cov=backend --cov-report=term-missing --cov-fail-under=80"
testpaths = ["tests"]

[tool.coverage.run]
source = ["backend"]
omit = ["tests/*"]
